<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解码 Agent Harness — Claude Code 架构深度剖析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#fafaf8;--bg-sidebar:#f5f5f0;--bg-code:#1e1e2e;--bg-card:#fff;
  --text:#2c2c2c;--text-secondary:#6b6b6b;--text-muted:#999;
  --accent:#4f46e5;--accent-light:#eef2ff;--accent-hover:#4338ca;
  --border:#e8e8e3;--border-light:#f0f0eb;
  --sidebar-w:280px;
  --font-serif:'Noto Serif SC',serif;
  --font-sans:'Noto Sans SC',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','Fira Code',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.06);
  --radius:8px;
  --transition:.2s ease;
}

[data-theme="dark"]{
  --bg:#161616;--bg-sidebar:#1a1a1a;--bg-code:#0d0d0d;--bg-card:#1e1e1e;
  --text:#d4d4d4;--text-secondary:#8b8b8b;--text-muted:#666;
  --accent:#818cf8;--accent-light:#1e1b4b;--accent-hover:#a5b4fc;
  --border:#2a2a2a;--border-light:#222;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}

html{font-size:16px;scroll-behavior:smooth;-webkit-font-smoothing:antialiased}

body{
  font-family:var(--font-sans);color:var(--text);background:var(--bg);
  line-height:1.8;display:flex;min-height:100vh;
  transition:background var(--transition),color var(--transition);
}

/* ─── Sidebar ─── */
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);
  background:var(--bg-sidebar);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
  transition:transform .3s ease,background var(--transition);
  overflow:hidden;
}

.sidebar-header{
  padding:28px 24px 20px;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.sidebar-header h1{
  font-family:var(--font-serif);font-size:1.1rem;font-weight:700;
  color:var(--text);letter-spacing:-.02em;line-height:1.3;
}
.sidebar-header p{
  font-size:.75rem;color:var(--text-muted);margin-top:4px;letter-spacing:.02em;
}

.sidebar-nav{
  flex:1;overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.nav-section{padding:12px 0}
.nav-section + .nav-section{border-top:1px solid var(--border-light)}

.nav-section-title{
  padding:0 24px;font-size:.68rem;font-weight:600;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:6px;
}
.nav-item{
  display:block;padding:5px 24px 5px 32px;
  font-size:.82rem;color:var(--text-secondary);
  text-decoration:none;cursor:pointer;
  transition:all var(--transition);border-left:2px solid transparent;
  line-height:1.5;
}
.nav-item:hover{color:var(--accent);background:var(--accent-light)}
.nav-item.active{
  color:var(--accent);font-weight:500;
  border-left-color:var(--accent);background:var(--accent-light);
}
.nav-item .chapter-num{
  font-family:var(--font-mono);font-size:.72rem;
  color:var(--text-muted);margin-right:6px;
}

.sidebar-footer{
  padding:14px 24px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.theme-toggle{
  width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg-card);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1rem;transition:all var(--transition);color:var(--text-secondary);
}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.gh-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.78rem;font-weight:500;color:var(--text-secondary);
  text-decoration:none;padding:6px 14px;border-radius:20px;
  border:1px solid var(--border);background:var(--bg-card);
  transition:all var(--transition);
}
.gh-link svg{width:16px;height:16px;fill:currentColor}
.gh-link:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* ─── Main ─── */
.main{
  margin-left:var(--sidebar-w);flex:1;min-width:0;
  display:flex;flex-direction:column;
}
.content-wrapper{
  padding:48px 260px 120px 40px;width:100%;
}

/* ─── Landing ─── */
.landing{text-align:center;padding:80px 0 60px}
.landing-badge{
  display:inline-block;font-size:.7rem;font-weight:500;
  padding:4px 14px;border-radius:20px;
  background:var(--accent-light);color:var(--accent);
  letter-spacing:.04em;margin-bottom:20px;
}
.landing h1{
  font-family:var(--font-serif);font-size:2.4rem;font-weight:700;
  line-height:1.25;letter-spacing:-.03em;margin-bottom:12px;
}
.landing h1 em{
  font-style:normal;color:var(--accent);
  background:linear-gradient(135deg,var(--accent),#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.landing .subtitle{
  font-size:1.1rem;color:var(--text-secondary);font-weight:300;margin-bottom:40px;
}
.landing-desc{
  max-width:540px;margin:0 auto 48px;
  font-size:.92rem;color:var(--text-secondary);line-height:1.8;
}
.chapter-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:14px;text-align:left;max-width:680px;margin:0 auto;
}
.chapter-card{
  padding:18px 20px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--bg-card);
  cursor:pointer;transition:all var(--transition);
  text-decoration:none;color:inherit;
}
.chapter-card:hover{
  border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px);
}
.chapter-card .num{
  font-family:var(--font-mono);font-size:.7rem;color:var(--accent);font-weight:500;
}
.chapter-card .title{font-size:.88rem;font-weight:500;margin-top:4px;line-height:1.4}
.chapter-card .desc{font-size:.75rem;color:var(--text-muted);margin-top:6px;line-height:1.5}

/* ─── Article ─── */
.article{display:none}
.article.visible{display:block}
.article-header{
  margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--border);
}
.article-header .part-label{
  font-size:.72rem;font-weight:600;color:var(--accent);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;
}
.article-header h1{
  font-family:var(--font-serif);font-size:1.9rem;font-weight:700;
  line-height:1.3;letter-spacing:-.02em;
}
.article-nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:64px;padding-top:24px;border-top:1px solid var(--border);
}
.article-nav a{
  font-size:.85rem;color:var(--accent);text-decoration:none;cursor:pointer;
  transition:opacity var(--transition);
}
.article-nav a:hover{opacity:.7}

/* ─── Markdown ─── */
.markdown-body{font-size:.95rem;line-height:1.85}
.markdown-body h1{display:none}
.markdown-body h2{
  font-family:var(--font-serif);font-size:1.4rem;font-weight:700;
  margin:48px 0 16px;padding-top:16px;border-top:1px solid var(--border-light);
}
.markdown-body h3{font-size:1.1rem;font-weight:600;margin:32px 0 12px}
.markdown-body h4{font-size:.95rem;font-weight:600;margin:24px 0 8px}
.markdown-body p{margin:0 0 16px}
.markdown-body blockquote{
  margin:20px 0;padding:12px 20px;border-left:3px solid var(--accent);
  background:var(--accent-light);border-radius:0 var(--radius) var(--radius) 0;
  color:var(--text-secondary);font-size:.9rem;
}
.markdown-body blockquote p:last-child{margin-bottom:0}
.markdown-body ul,.markdown-body ol{margin:0 0 16px;padding-left:1.6em}
.markdown-body li{margin:4px 0}
.markdown-body li::marker{color:var(--accent)}
.markdown-body strong{font-weight:600;color:var(--text)}
.markdown-body a{
  color:var(--accent);text-decoration:none;
  border-bottom:1px solid transparent;transition:border-color var(--transition);
}
.markdown-body a:hover{border-bottom-color:var(--accent)}
.markdown-body hr{border:none;border-top:1px solid var(--border);margin:32px 0}
.markdown-body table{width:100%;border-collapse:collapse;margin:16px 0;font-size:.88rem}
.markdown-body th,.markdown-body td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
.markdown-body th{font-weight:600;font-size:.82rem;color:var(--text-secondary);background:var(--bg-sidebar)}
.markdown-body tr:hover td{background:var(--accent-light)}
.markdown-body code{
  font-family:var(--font-mono);font-size:.84em;padding:2px 7px;
  border-radius:4px;background:var(--bg-code);color:#e2e8f0;
}
.markdown-body pre{
  margin:20px 0;border-radius:var(--radius);background:var(--bg-code);
  overflow-x:auto;border:1px solid var(--border);
}
.markdown-body pre code{
  display:block;padding:20px 24px;background:transparent;color:inherit;
  font-size:.82rem;line-height:1.7;white-space:pre;
}

/* ─── TOC ─── */
.toc{
  position:fixed;top:24px;right:32px;width:200px;
  max-height:calc(100vh - 48px);overflow-y:auto;
  font-size:.78rem;color:var(--text-muted);scrollbar-width:none;
}
.toc::-webkit-scrollbar{display:none}
.toc-title{
  font-weight:600;font-size:.7rem;text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:10px;color:var(--text-secondary);
}
.toc a{display:block;padding:3px 0;color:var(--text-muted);text-decoration:none;line-height:1.5;transition:color var(--transition)}
.toc a:hover,.toc a.active{color:var(--accent)}

/* ─── Loading ─── */
.loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 0;color:var(--text-muted);gap:16px;
}
.spinner{
  width:24px;height:24px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Mobile ─── */
.mobile-header{
  display:none;position:fixed;top:0;left:0;right:0;height:52px;
  background:var(--bg-sidebar);border-bottom:1px solid var(--border);
  z-index:99;padding:0 16px;align-items:center;gap:12px;
}
.mobile-header .menu-btn{
  width:36px;height:36px;border:none;background:none;
  cursor:pointer;color:var(--text);font-size:1.2rem;
}
.mobile-header .title{font-size:.88rem;font-weight:500}
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);
  z-index:99;opacity:0;transition:opacity .3s;
}
.overlay.visible{display:block;opacity:1}

@media(max-width:1200px){
  .toc{display:none}
  .content-wrapper{padding:48px 40px 120px}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .mobile-header{display:flex}
  .content-wrapper{padding-top:72px;padding-right:20px;padding-left:20px}
  .landing h1{font-size:1.8rem}
  .chapter-grid{grid-template-columns:1fr}
}

/* ─── Progress ─── */
.progress{
  position:fixed;top:0;left:var(--sidebar-w);right:0;
  height:2px;background:var(--accent);z-index:200;
  transform-origin:left;transform:scaleX(0);transition:transform .1s;
}
@media(max-width:768px){.progress{left:0}}

/* ─── Print ─── */
@media print{
  .sidebar,.mobile-header,.progress,.toc,.article-nav{display:none!important}
  .main{margin-left:0!important}
  .content-wrapper{max-width:100%!important;padding:0!important}
}
</style>
</head>
<body>

<div class="progress" id="progress"></div>
<div class="overlay" id="overlay"></div>

<header class="mobile-header">
  <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
  <span class="title">解码 Agent Harness</span>
</header>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>解码 Agent Harness</h1>
    <p>Claude Code 架构深度剖析</p>
  </div>
  <nav class="sidebar-nav" id="nav"></nav>
  <div class="sidebar-footer">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle theme">&#9790;</button>
    <a class="gh-link" href="https://github.com/lintsinghua/claude-code-book" target="_blank">
      <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
  </div>
</aside>

<main class="main">
  <div class="content-wrapper" id="content"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
const BASE='https://raw.githubusercontent.com/lintsinghua/claude-code-book/main/';

const CHAPTERS=[
  {id:'preface',title:'前言',file:'00-前言.md',part:''},
  {id:'ch01',num:'01',title:'智能体编程的新范式',file:'第一部分-基础篇/01-智能体编程的新范式.md',part:'第一部分 · 基础篇',desc:'从聊天到工具调用，范式如何转移'},
  {id:'ch02',num:'02',title:'对话循环 — Agent 的心跳',file:'第一部分-基础篇/02-对话循环-Agent的心跳.md',part:'第一部分 · 基础篇',desc:'异步生成器驱动的永动主循环'},
  {id:'ch03',num:'03',title:'工具系统 — Agent 的双手',file:'第一部分-基础篇/03-工具系统-Agent的双手.md',part:'第一部分 · 基础篇',desc:'45+ 工具的注册、过滤与并发调度'},
  {id:'ch04',num:'04',title:'权限管线 — Agent 的护栏',file:'第一部分-基础篇/04-权限管线-Agent的护栏.md',part:'第一部分 · 基础篇',desc:'四阶段安全管线与权限模式谱系'},
  {id:'ch05',num:'05',title:'设置与配置 — Agent 的基因',file:'第二部分-核心系统篇/05-设置与配置-Agent的基因.md',part:'第二部分 · 核心系统篇',desc:'六层配置优先级与供应链攻击防御'},
  {id:'ch06',num:'06',title:'记忆系统 — Agent 的长期记忆',file:'第二部分-核心系统篇/06-记忆系统-Agent的长期记忆.md',part:'第二部分 · 核心系统篇',desc:'持久化、索引与跨会话保持'},
  {id:'ch07',num:'07',title:'上下文管理 — Agent 的工作记忆',file:'第二部分-核心系统篇/07-上下文管理-Agent的工作记忆.md',part:'第二部分 · 核心系统篇',desc:'四级渐进压缩与 token 预算管理'},
  {id:'ch08',num:'08',title:'钩子系统 — Agent 的生命周期扩展点',file:'第二部分-核心系统篇/08-钩子系统-Agent的生命周期扩展点.md',part:'第二部分 · 核心系统篇',desc:'26 个生命周期事件与安全边界'},
  {id:'ch09',num:'09',title:'子智能体与 Fork 模式',file:'第三部分-高级模式篇/09-子智能体与Fork模式.md',part:'第三部分 · 高级模式篇',desc:'字节级上下文继承与并行子任务'},
  {id:'ch10',num:'10',title:'协调器模式 — 多智能体编排',file:'第三部分-高级模式篇/10-协调器模式-多智能体编排.md',part:'第三部分 · 高级模式篇',desc:'Coordinator-Worker 架构'},
  {id:'ch11',num:'11',title:'技能系统与插件架构',file:'第三部分-高级模式篇/11-技能系统与插件架构.md',part:'第三部分 · 高级模式篇',desc:'零配置可用的技能协议'},
  {id:'ch12',num:'12',title:'MCP 集成与外部协议',file:'第三部分-高级模式篇/12-MCP集成与外部协议.md',part:'第三部分 · 高级模式篇',desc:'Model Context Protocol 与协议桥接'},
  {id:'ch13',num:'13',title:'流式架构与性能优化',file:'第四部分-工程实践篇/13-流式架构与性能优化.md',part:'第四部分 · 工程实践篇',desc:'并行预取、惰性加载、缓存共享'},
  {id:'ch14',num:'14',title:'Plan 模式与结构化工作流',file:'第四部分-工程实践篇/14-Plan模式与结构化工作流.md',part:'第四部分 · 工程实践篇',desc:'计划与执行分离'},
  {id:'ch15',num:'15',title:'构建你自己的 Agent Harness',file:'第四部分-工程实践篇/15-构建你自己的Agent-Harness.md',part:'第四部分 · 工程实践篇',desc:'六步从零实现'},
  {id:'appa',num:'A',title:'源码导航地图',file:'附录/A-源码导航地图.md',part:'附录',desc:'模块依赖与数据流'},
  {id:'appb',num:'B',title:'工具完整清单',file:'附录/B-工具完整清单.md',part:'附录',desc:'50+ 工具速查'},
  {id:'appc',num:'C',title:'功能标志速查表',file:'附录/C-功能标志速查表.md',part:'附录',desc:'89 个 Feature Flag'},
  {id:'appd',num:'D',title:'术语表',file:'附录/D-术语表.md',part:'附录',desc:'100 条中英对照'},
];

const cache={};
let currentChapter=null;

marked.setOptions({
  highlight:(code,lang)=>{
    if(lang&&hljs.getLanguage(lang))return hljs.highlight(code,{language:lang}).value;
    return hljs.highlightAuto(code).value;
  },
  breaks:false,gfm:true,
});

function buildNav(){
  const nav=document.getElementById('nav');
  let lastPart='',html='';
  CHAPTERS.forEach(ch=>{
    if(ch.part&&ch.part!==lastPart){
      if(lastPart)html+='</div>';
      html+=`<div class="nav-section"><div class="nav-section-title">${ch.part}</div>`;
      lastPart=ch.part;
    }else if(!ch.part&&lastPart){
      html+='</div>';lastPart='';
    }
    if(!ch.part&&!lastPart){html+='<div class="nav-section">';lastPart='__none__'}
    const numHtml=ch.num?`<span class="chapter-num">${ch.num}</span>`:'';
    html+=`<a class="nav-item" data-id="${ch.id}" onclick="loadChapter('${ch.id}')">${numHtml}${ch.title}</a>`;
  });
  if(lastPart)html+='</div>';
  nav.innerHTML=html;
}

async function loadChapter(id){
  const ch=CHAPTERS.find(c=>c.id===id);
  if(!ch)return;
  history.pushState(null,'','#'+id);
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const activeNav=document.querySelector(`.nav-item[data-id="${id}"]`);
  if(activeNav)activeNav.classList.add('active');
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  const content=document.getElementById('content');
  content.innerHTML='<div class="loading"><div class="spinner"></div><span>加载中…</span></div>';
  window.scrollTo({top:0});
  let md;
  if(cache[id]){md=cache[id]}
  else{
    try{
      const resp=await fetch(BASE+encodeURIComponent(ch.file));
      if(!resp.ok)throw new Error(resp.status);
      md=await resp.text();cache[id]=md;
    }catch(e){
      content.innerHTML=`<div class="loading"><p>加载失败 (${e.message})</p><p style="font-size:.82rem;margin-top:8px">请检查网络连接后刷新重试</p></div>`;
      return;
    }
  }
  currentChapter=id;
  const html=marked.parse(md);
  const idx=CHAPTERS.findIndex(c=>c.id===id);
  const prev=idx>0?CHAPTERS[idx-1]:null;
  const next=idx<CHAPTERS.length-1?CHAPTERS[idx+1]:null;
  const partLabel=ch.part?`<div class="part-label">${ch.part}</div>`:'';
  const tocHtml='<div class="toc" id="toc"><div class="toc-title">目录</div></div>';
  content.innerHTML=`
    ${tocHtml}
    <article class="article visible">
      <div class="article-header">${partLabel}<h1>${ch.title}</h1></div>
      <div class="markdown-body">${html}</div>
      <div class="article-nav">
        ${prev?`<a onclick="loadChapter('${prev.id}')">&#8592; ${prev.title}</a>`:'<span></span>'}
        ${next?`<a onclick="loadChapter('${next.id}')">${next.title} &#8594;</a>`:'<span></span>'}
      </div>
    </article>
  `;
  document.title=`${ch.title} — 解码 Agent Harness`;
  buildTOC();
  updateProgress();
}

function buildTOC(){
  const toc=document.getElementById('toc');
  if(!toc)return;
  const headings=document.querySelectorAll('.markdown-body h2,.markdown-body h3');
  if(headings.length===0){toc.style.display='none';return}
  let html='<div class="toc-title">目录</div>';
  headings.forEach((h,i)=>{
    const hid='heading-'+i;h.id=hid;
    const indent=h.tagName==='H3'?'padding-left:12px;font-size:.72rem;':'';
    html+=`<a href="#${hid}" style="${indent}" onclick="smoothScroll(event,'${hid}')">${h.textContent}</a>`;
  });
  toc.innerHTML=html;
}

function smoothScroll(e,id){e.preventDefault();document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'})}

function showLanding(){
  history.pushState(null,'',window.location.pathname);
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const content=document.getElementById('content');
  let cardsHtml='';
  CHAPTERS.filter(c=>c.num).forEach(ch=>{
    cardsHtml+=`
      <div class="chapter-card" onclick="loadChapter('${ch.id}')">
        <div class="num">${ch.num}</div>
        <div class="title">${ch.title}</div>
        ${ch.desc?`<div class="desc">${ch.desc}</div>`:''}
      </div>`;
  });
  content.innerHTML=`
    <div class="landing">
      <div class="landing-badge">开源免费 · CC BY-NC-SA 4.0</div>
      <h1>解码 <em>Agent Harness</em></h1>
      <div class="subtitle">Claude Code 架构深度剖析</div>
      <p class="landing-desc">
        不做使用教程，不列 Prompt 技巧——拆解 Agent 的骨架与神经。<br>
        读懂 Claude Code 的设计决策，你就拥有了一套可迁移到任何 Agent 框架的心智模型。
      </p>
      <div class="chapter-grid">${cardsHtml}</div>
    </div>
  `;
  document.title='解码 Agent Harness — Claude Code 架构深度剖析';
}

function updateProgress(){
  const el=document.getElementById('progress');
  const scrolled=window.scrollY;
  const total=document.documentElement.scrollHeight-window.innerHeight;
  el.style.transform=`scaleX(${total>0?scrolled/total:0})`;
}
window.addEventListener('scroll',updateProgress,{passive:true});

function toggleTheme(){
  const current=document.documentElement.getAttribute('data-theme');
  const next=current==='dark'?'':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
  document.getElementById('themeBtn').innerHTML=next==='dark'?'&#9788;':'&#9790;';
}
(function(){
  const saved=localStorage.getItem('theme');
  if(saved){
    document.documentElement.setAttribute('data-theme',saved);
    document.getElementById('themeBtn').innerHTML=saved==='dark'?'&#9788;':'&#9790;';
  }else if(window.matchMedia('(prefers-color-scheme:dark)').matches){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('themeBtn').innerHTML='&#9788;';
  }
})();

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('visible');
}
document.getElementById('overlay').addEventListener('click',toggleSidebar);

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  const idx=CHAPTERS.findIndex(c=>c.id===currentChapter);
  if(e.key==='ArrowLeft'&&idx>0)loadChapter(CHAPTERS[idx-1].id);
  if(e.key==='ArrowRight'&&idx<CHAPTERS.length-1)loadChapter(CHAPTERS[idx+1].id);
});

window.addEventListener('hashchange',()=>{
  const hash=location.hash.slice(1);
  if(hash&&CHAPTERS.find(c=>c.id===hash))loadChapter(hash);
});

buildNav();
const hash=location.hash.slice(1);
if(hash&&CHAPTERS.find(c=>c.id===hash))loadChapter(hash);
else showLanding();
</script>
</body>
</html>
